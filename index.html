<!DOCTYPE html>

<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Draw in Coffee</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,300;1,400&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Sans SC',sans-serif;background:#3a2418;color:#F5E6C8;touch-action:none;user-select:none;-webkit-user-select:none}
#woodBg{position:fixed;inset:0;z-index:0}
.wl{position:fixed;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse at 28% 22%,rgba(255,215,160,.12) 0%,transparent 50%),radial-gradient(ellipse at 72% 78%,rgba(0,0,0,.25) 0%,transparent 55%)}
.page{position:fixed;inset:0;z-index:2;display:none;flex-direction:column;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.page.active{display:flex}
.brand{position:fixed;top:10px;left:14px;z-index:10}
.brand h1{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(14px,2.8vw,20px);font-weight:400;color:#F5E6C8;text-shadow:0 2px 10px rgba(0,0,0,.6)}
.brand p{font-size:7px;color:rgba(245,230,200,.3);letter-spacing:1.5px;margin-top:1px}
.money{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:10;background:rgba(0,0,0,.4);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(245,230,200,.1);border-radius:20px;padding:5px 14px;font-size:11px;font-weight:500}
.osl{position:fixed;top:10px;right:10px;z-index:10;background:rgba(0,0,0,.45);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(245,230,200,.1);border-radius:10px;padding:10px 12px;max-width:155px;font-size:10px;display:none}
.osl.show{display:block}
.osl .ot{font-size:8px;color:rgba(245,230,200,.3);letter-spacing:2px;margin-bottom:4px}
.osl .on{font-size:13px;font-weight:500;margin-bottom:3px}
.osl .od{color:rgba(245,230,200,.5);line-height:1.5}
.tt{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(18px,4.5vw,28px);text-shadow:0 2px 8px rgba(0,0,0,.5);text-align:center;margin-bottom:4px}
.sub{font-size:10px;color:rgba(245,230,200,.35);letter-spacing:2px;text-align:center;margin-bottom:20px}
.btn{padding:9px 22px;border:1px solid rgba(245,230,200,.12);border-radius:18px;background:rgba(245,230,200,.06);color:#F5E6C8;font-family:'Playfair Display',serif;font-style:italic;font-size:11px;cursor:pointer;transition:all .2s}
.btn:active{transform:scale(.93)}
.btn.pr{background:linear-gradient(135deg,#F5E6C8,#E8D5B0);color:#3E2723;border-color:#F5E6C8;font-weight:600}
.fade{animation:fi .4s ease}
@keyframes fi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
/* cups */
.cups-r{display:flex;gap:clamp(10px,2.5vw,20px);justify-content:center;flex-wrap:wrap}
.cup-cd{width:clamp(95px,25vw,130px);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:8px;padding:14px 10px 12px;border-radius:14px;background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.06);transition:all .3s}
.cup-cd:active{transform:scale(.95)}
.cup-v{width:90px;height:80px;position:relative}
.cup-nm{font-size:11px;font-weight:500;letter-spacing:1px}.cup-ds{font-size:8px;color:rgba(245,230,200,.35)}
.tea-body{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:68px;height:36px;border-radius:0 0 50% 50%/0 0 100% 100%;background:linear-gradient(135deg,#FFF8F0,#F0E4D8);box-shadow:inset -4px 0 10px rgba(0,0,0,.04),0 3px 10px rgba(0,0,0,.15)}
.tea-rim{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);width:72px;height:10px;border-radius:50%;background:linear-gradient(180deg,#E8D8C8,#F5EDE0)}
.tea-gold{position:absolute;bottom:43px;left:50%;transform:translateX(-50%);width:70px;height:8px;border-radius:50%;border:1.5px solid rgba(196,164,110,.5)}
.tea-hdl{position:absolute;bottom:18px;right:4px;width:14px;height:22px;border:3px solid #E8D8C8;border-left:none;border-radius:0 12px 12px 0}
.tea-sau{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:80px;height:9px;border-radius:50%;background:linear-gradient(180deg,#F0E4D8,#DDD0C0)}
.tea-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:5px}
.tea-dots span{width:5px;height:5px;border-radius:50%;background:rgba(196,164,110,.35)}
.tea-cof{position:absolute;bottom:38px;left:50%;transform:translateX(-50%);width:58px;height:8px;border-radius:50%;background:radial-gradient(ellipse,#5A3520,#3B2010)}
.mug-body{position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:52px;height:54px;border-radius:0 0 6px 6px;background:linear-gradient(135deg,#D4E0D8,#B8C8C0);box-shadow:inset -5px 0 10px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.15)}
.mug-rim{position:absolute;bottom:58px;left:50%;transform:translateX(-50%);width:56px;height:10px;border-radius:50%;background:linear-gradient(180deg,#C0D0C8,#D4E0D8)}
.mug-hdl{position:absolute;bottom:18px;right:10px;width:16px;height:28px;border:4px solid #B8C8C0;border-left:none;border-radius:0 14px 14px 0}
.mug-str{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);width:52px;height:34px;display:flex;flex-direction:column;gap:5px;align-items:center;padding-top:4px}
.mug-str span{width:36px;height:2px;background:rgba(100,130,120,.2);border-radius:1px}
.mug-cof{position:absolute;bottom:52px;left:50%;transform:translateX(-50%);width:42px;height:8px;border-radius:50%;background:radial-gradient(ellipse,#5A3520,#3B2010)}
.esp-body{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:42px;height:32px;border-radius:0 0 4px 4px;background:linear-gradient(135deg,#FFF5F0,#F0E0D0);box-shadow:0 3px 8px rgba(0,0,0,.12);clip-path:polygon(5% 0,95% 0,100% 100%,0 100%)}
.esp-rim{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);width:46px;height:8px;border-radius:50%;background:linear-gradient(180deg,#E8D0C0,#F0E0D0)}
.esp-hdl{position:absolute;bottom:16px;right:16px;width:10px;height:18px;border:2.5px solid #E8D0C0;border-left:none;border-radius:0 10px 10px 0}
.esp-sau{position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:56px;height:7px;border-radius:50%;background:linear-gradient(180deg,#E8D8C8,#D0C0B0)}
.esp-dia{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:4px}
.esp-dia span{width:6px;height:6px;background:rgba(196,164,110,.25);transform:rotate(45deg)}
.esp-cof{position:absolute;bottom:34px;left:50%;transform:translateX(-50%);width:34px;height:6px;border-radius:50%;background:radial-gradient(ellipse,#5A3520,#3B2010)}
.cv-stm{position:absolute;top:2px;left:50%;transform:translateX(-50%);width:30px;height:16px}
.cv-stm span{position:absolute;bottom:0;width:1.5px;background:rgba(255,255,255,.06);border-radius:1px;animation:cst 2.2s ease-in-out infinite}
@keyframes cst{0%{height:0;opacity:0}20%{opacity:.35}100%{height:14px;opacity:0;transform:translateX(var(--d,0)) scaleX(2)}}
/* machine */
.mac{width:clamp(180px,48vw,260px);height:clamp(130px,34vw,180px);background:linear-gradient(180deg,#333840,#22262C,#1A1E24);border-radius:10px 10px 2px 2px;position:relative;box-shadow:0 8px 28px rgba(0,0,0,.45);margin-top:8px}
.mac-top{position:absolute;top:0;left:0;right:0;height:14px;background:linear-gradient(180deg,#444850,#333840);border-radius:10px 10px 0 0}
.mac-ga{position:absolute;top:22px;left:50%;transform:translateX(-50%);width:40px;height:40px;border-radius:50%;background:radial-gradient(circle,#1a1e22,#0f1215);border:2px solid #444;display:flex;align-items:center;justify-content:center}
.mac-nd{width:2px;height:16px;background:#E85050;border-radius:1px;transform-origin:bottom center;transition:transform .3s}
.mac-grp{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center}
.mac-pf{width:60px;height:10px;background:linear-gradient(180deg,#888,#666);border-radius:3px 3px 0 0}
.mac-sp{display:flex;gap:12px}.mac-sp span{width:3px;height:8px;background:#555;border-radius:0 0 2px 2px}
.mac-dr{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:75%;height:16px;background:linear-gradient(180deg,#2a2e34,#1a1e24);border-radius:2px}
.mac-li{position:absolute;top:24px;right:16px;width:5px;height:5px;border-radius:50%;background:#4ADE80;box-shadow:0 0 6px #4ADE80;animation:bk 2s infinite}
@keyframes bk{0%,100%{opacity:1}50%{opacity:.4}}
.e-st{display:flex;gap:10px;height:0;transition:height .8s;margin-top:-2px}.e-st.on{height:30px}
.e-st span{width:2.5px;background:linear-gradient(to bottom,#7B5230,#4A2A18);border-radius:2px;height:100%}
.mcup{width:46px;height:28px;border-radius:0 0 4px 4px;background:linear-gradient(135deg,#F5EDE0,#E8DDD0);box-shadow:0 2px 6px rgba(0,0,0,.18);margin-top:-2px;position:relative;overflow:hidden}
.mcup-f{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,#3B2010,#5A3520);border-radius:0 0 3px 3px}
/* extract bar */
.ext-bar{width:28px;height:clamp(130px,32vw,190px);background:rgba(255,255,255,.06);border-radius:14px;position:relative;overflow:hidden;border:1px solid rgba(255,255,255,.08);margin-top:12px}
.ext-zone{position:absolute;left:2px;right:2px;background:rgba(74,222,128,.12);border:1px solid rgba(74,222,128,.2);border-radius:4px}
.ext-fill{position:absolute;bottom:0;left:2px;right:2px;background:linear-gradient(to top,#8B5A30,#D4A060);border-radius:0 0 12px 12px}
.lbl{font-size:9px;color:rgba(245,230,200,.3);letter-spacing:1px;margin-top:6px}
.gbtn{width:56px;height:56px;border-radius:50%;border:2px solid rgba(245,230,200,.2);background:rgba(245,230,200,.08);color:#F5E6C8;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:6px}
.gbtn.p{background:rgba(245,230,200,.2);transform:scale(.92)}
.res{font-size:12px;text-align:center;line-height:1.6;margin:8px 0}
.res.g{color:#4ADE80}.res.y{color:#FBBF24}.res.r{color:#F87171}
/* syrup - timing ring */
.syr-ring{width:120px;height:120px;border-radius:50%;border:3px solid rgba(255,255,255,.08);position:relative;margin:12px 0}
.syr-target{position:absolute;width:100%;height:100%;top:0;left:0}
.syr-dot{position:absolute;width:14px;height:14px;border-radius:50%;background:#D4A060;box-shadow:0 0 8px rgba(212,160,96,.5);top:50%;left:50%;margin:-7px}
.syr-ico-center{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px}
.syr-result{font-size:11px;text-align:center;margin-top:4px}
.syr-bottle{width:72px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:12px 8px;border-radius:14px;border:1.5px solid rgba(255,255,255,.06);background:rgba(255,255,255,.03);transition:all .2s}
.syr-bottle:active{transform:scale(.94)}
.syr-bottle.sel{border-color:rgba(74,222,128,.35);background:rgba(74,222,128,.08)}
.syr-ico{font-size:28px}
.syr-nm{font-size:9px;text-align:center;color:rgba(245,230,200,.5)}
.syr-area{display:flex;flex-direction:column;align-items:center;gap:8px;width:100%;max-width:340px}
/* pour - tap game */
.pour-cup{width:100px;height:80px;border-radius:0 0 8px 8px;position:relative;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.2);margin:12px 0}
.pour-cup.dark{background:linear-gradient(135deg,#3A2E22,#2A2018)}
.pour-fill{position:absolute;bottom:0;left:0;right:0;border-radius:0 0 6px 6px;transition:height .15s}
.pour-fill.water{background:linear-gradient(to top,rgba(100,160,200,.7),rgba(130,185,220,.5))}
.pour-fill.milk{background:linear-gradient(to top,#F0DCC0,#E8D0B0)}
.pour-zone{position:absolute;left:0;right:0;border-top:2px dashed rgba(74,222,128,.4);border-bottom:2px dashed rgba(74,222,128,.4);background:rgba(74,222,128,.06)}
.pour-count{font-size:20px;font-weight:700;color:rgba(245,230,200,.6);margin:4px 0}
/* art */
.art-w{display:flex;flex-direction:column;align-items:center;gap:10px}
.cup-top{position:relative}
.co{border-radius:50%;padding:6px;background:linear-gradient(145deg,#FEFEFE,#F0E8DE,#DDD4C8);box-shadow:0 8px 28px rgba(0,0,0,.3);position:relative}
.co::before{content:'';position:absolute;inset:3px;border-radius:50%;border:1px solid rgba(196,164,110,.3);z-index:5;pointer-events:none}
.ci{position:relative;border-radius:50%;overflow:hidden}
.ci,#cofC,#artC{width:clamp(220px,min(58vw,46vh),310px);height:clamp(220px,min(58vw,46vh),310px)}
#cofC{position:absolute;inset:0;border-radius:50%;z-index:0}
#artC{position:absolute;inset:0;border-radius:50%;z-index:2;cursor:crosshair}
.ah{position:absolute;right:-18px;top:48%;transform:translateY(-55%);width:22px;height:36px;border:4px solid #DDD4C8;border-left:none;border-radius:0 18px 18px 0}
.art-stm{position:absolute;top:-45px;left:50%;transform:translateX(-50%);width:100px;height:50px;pointer-events:none;z-index:5}
.asm{position:absolute;bottom:0;width:2px;border-radius:1px;background:linear-gradient(to top,rgba(255,255,255,.05),transparent);animation:af var(--d) ease-in-out infinite;animation-delay:var(--dl)}
@keyframes af{0%{height:0;opacity:0}15%{opacity:.35}50%{opacity:.18;transform:translateX(var(--dr)) scaleX(2)}100%{height:var(--h);opacity:0;transform:translateX(calc(var(--dr)*1.5)) scaleX(3)}}
.at{display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:center}
.tb{width:34px;height:34px;border-radius:50%;border:1px solid rgba(245,230,200,.12);background:rgba(245,230,200,.06);color:#F5E6C8;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tb:active{transform:scale(.9)}.tb.on{background:rgba(245,230,200,.2);border-color:rgba(245,230,200,.35)}
.szr{-webkit-appearance:none;appearance:none;width:48px;height:1.5px;background:rgba(245,230,200,.15);outline:none}
.szr::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#F5E6C8;cursor:pointer}
/* receipt */
.rbox{position:fixed;top:0;right:12px;z-index:100;animation:rd .5s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes rd{from{transform:translateY(-110%);opacity:0}to{transform:translateY(0);opacity:1}}
.rbox.out{animation:ru .4s ease-in forwards}
@keyframes ru{to{transform:translateY(-115%);opacity:0}}
.rcp{width:165px;background:#FEFCF6;box-shadow:3px 5px 18px rgba(0,0,0,.28);position:relative;color:#3E2723}
.rcp-b{padding:12px 10px 12px}
.rl{text-align:center;font-family:'Playfair Display',serif;font-style:italic;font-size:12px;font-weight:600}
.rtg{text-align:center;font-size:6px;color:#bbb;letter-spacing:2px;margin-top:1px}
.rsp{border:none;border-top:1px dashed #d4cfc4;margin:6px 0}
.rr{display:flex;justify-content:space-between;font-size:8.5px;color:#999;margin:2px 0}
.rr span:last-child{color:#666;font-weight:400}
.rr.tip span:last-child{color:#16A34A}.rr.ref span:last-child{color:#DC2626}
.rsc{font-size:24px;text-align:center;margin:4px 0 1px}
.rsr{text-align:center;font-size:14px;letter-spacing:2px}
.rs{display:inline-block;animation:sp .25s ease-out backwards}
@keyframes sp{from{transform:scale(0) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.rcm{text-align:center;font-size:9px;color:#888;line-height:1.6;margin-top:5px}
.rzz{position:absolute;bottom:-5px;left:0;width:100%;height:5px;overflow:hidden;line-height:0}
.rzz svg{display:block;width:100%;height:5px}
.bst{position:fixed;top:0;right:12px;z-index:99;pointer-events:none;width:165px;height:260px}
.bstr{position:absolute;animation:bf 1s cubic-bezier(.16,1,.3,1) forwards}
@keyframes bf{0%{opacity:1;transform:scale(0) rotate(0)}40%{opacity:1;transform:scale(1.2)}100%{opacity:0;transform:scale(.3) rotate(360deg)}}
.gal{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:5px 12px 7px;display:flex;align-items:center;gap:7px;overflow-x:auto;scrollbar-width:none;background:linear-gradient(to top,rgba(30,16,8,.6),transparent)}
.gal::-webkit-scrollbar{display:none}
.gl{font-family:'Playfair Display',serif;font-style:italic;font-size:9px;color:rgba(245,230,200,.22);white-space:nowrap;flex-shrink:0}
.gc{width:38px;height:38px;border-radius:50%;background:#3B2418;flex-shrink:0;overflow:hidden;border:1.5px solid rgba(245,230,200,.1)}
.gc img{width:100%;height:100%;object-fit:cover;border-radius:50%}
</style>
</head>
<body>
<canvas id="woodBg"></canvas><div class="wl"></div>
<div class="brand"><h1>Draw in Coffee</h1><p>Mindful brewing for a chaotic world.</p></div>
<div class="money" id="mb"></div>
<div class="osl" id="osl"><div class="ot">ORDER</div><div class="on" id="oN"></div><div class="od" id="oD"></div></div>
<div class="page" id="pCup"></div>
<div class="page" id="pExt"></div>
<div class="page" id="pSyr"></div>
<div class="page" id="pPour"></div>
<div class="page" id="pArt"></div>
<div id="rM"></div><div id="bM"></div>
<div class="gal" id="gal"><span class="gl">Collection</span></div>
<script>
var ORDERS=[{name:"\u62FF\u94C1",base:"milk",syrups:[],shots:2,price:32,art:true},{name:"\u7F8E\u5F0F",base:"water",syrups:[],shots:2,price:28,art:false},{name:"\u9999\u8349\u62FF\u94C1",base:"milk",syrups:["\u9999\u8349\u7CD6\u6D46"],shots:2,price:36,art:true},{name:"\u7126\u7CD6\u739B\u5947\u6735",base:"milk",syrups:["\u7126\u7CD6\u9171"],shots:2,price:38,art:true},{name:"\u6469\u5361",base:"milk",syrups:["\u53EF\u53EF\u9171"],shots:2,price:36,art:true},{name:"\u69DB\u679C\u62FF\u94C1",base:"milk",syrups:["\u69DB\u679C\u7CD6\u6D46"],shots:2,price:36,art:true},{name:"\u51B0\u7F8E\u5F0F",base:"water",syrups:[],shots:3,price:30,art:false},{name:"\u9999\u8349\u7F8E\u5F0F",base:"water",syrups:["\u9999\u8349\u7CD6\u6D46"],shots:2,price:32,art:false},{name:"\u7126\u7CD6\u62FF\u94C1",base:"milk",syrups:["\u7126\u7CD6\u9171"],shots:2,price:38,art:true}];
var SYRS=["\u9999\u8349\u7CD6\u6D46","\u7126\u7CD6\u9171","\u69DB\u679C\u7CD6\u6D46","\u53EF\u53EF\u9171"];
